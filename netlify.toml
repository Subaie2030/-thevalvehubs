# TheValveHubs — Netlify Configuration
[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["netlify/functions/_db.js", "netlify/functions/_auth.js", "netlify/functions/_cors.js"]

# ─── API Route Redirects ─────────────────────────────────────────────
