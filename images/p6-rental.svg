<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7A1C1C"/>
      <stop offset="100%" style="stop-color:#C0392B"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bg)"/>
  <!-- pipeline main -->
  <rect x="20" y="82" width="360" height="28" rx="5" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <!-- bypass line top -->
  <rect x="100" y="48" width="200" height="14" rx="4" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- vertical connectors -->
  <rect x="100" y="48" width="14" height="62" rx="4" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <rect x="286" y="48" width="14" height="62" rx="4" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  <!-- bypass valve (ball valve symbol) -->
  <circle cx="200" cy="55" r="16" fill="rgba(200,151,58,0.8)" stroke="rgba(200,151,58,1)" stroke-width="2"/>
  <rect x="192" y="51" width="16" height="8" rx="1" fill="rgba(255,255,255,0.8)"/>
  <!-- main valve (gate) -->
  <rect x="172" y="76" width="56" height="40" rx="4" fill="rgba(200,151,58,0.7)" stroke="rgba(200,151,58,0.9)" stroke-width="2"/>
  <rect x="192" y="60" width="16" height="16" rx="2" fill="rgba(200,151,58,0.8)"/>
  <!-- flanges -->
  <rect x="158" y="80" width="14" height="32" rx="2" fill="rgba(255,255,255,0.2)"/>
  <rect x="228" y="80" width="14" height="32" rx="2" fill="rgba(255,255,255,0.2)"/>
  <!-- pressure gauge -->
  <circle cx="340" cy="72" r="16" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <line x1="340" y1="82" x2="340" y2="88" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <line x1="340" y1="62" x2="340" y2="66" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <line x1="328" y1="72" x2="332" y2="72" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <line x1="348" y1="72" x2="352" y2="72" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
  <line x1="340" y1="72" x2="346" y2="66" stroke="rgba(200,151,58,0.9)" stroke-width="2"/>
  <!-- label -->
  <text x="200" y="178" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11" font-family="Inter,Arial,sans-serif">Replace → images/p6-rental.jpg</text>
</svg>
