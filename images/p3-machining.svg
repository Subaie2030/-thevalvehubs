<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A2A4A"/>
      <stop offset="100%" style="stop-color:#2C4A7C"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bg)"/>
  <!-- CNC lathe bed -->
  <rect x="30" y="130" width="340" height="20" rx="3" fill="rgba(255,255,255,0.15)"/>
  <!-- chuck -->
  <circle cx="100" cy="100" r="40" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.3)" stroke-width="3"/>
  <circle cx="100" cy="100" r="24" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <circle cx="100" cy="100" r="8" fill="rgba(200,151,58,0.8)"/>
  <!-- jaw 1 -->
  <rect x="96" y="62" width="8" height="16" rx="1" fill="rgba(255,255,255,0.5)"/>
  <!-- jaw 2 -->
  <rect x="96" y="122" width="8" height="16" rx="1" fill="rgba(255,255,255,0.5)"/>
  <!-- jaw 3 -->
  <rect x="62" y="96" width="16" height="8" rx="1" fill="rgba(255,255,255,0.5)"/>
  <!-- jaw 4 -->
  <rect x="122" y="96" width="16" height="8" rx="1" fill="rgba(255,255,255,0.5)"/>
  <!-- workpiece -->
  <rect x="140" y="82" width="120" height="36" rx="4" fill="rgba(200,151,58,0.6)" stroke="rgba(200,151,58,0.9)" stroke-width="2"/>
  <!-- cutting tool -->
  <polygon points="260,95 300,80 300,100" fill="rgba(255,255,255,0.7)"/>
  <rect x="300" y="84" width="50" height="12" rx="2" fill="rgba(255,255,255,0.3)"/>
  <!-- sparks -->
  <circle cx="264" cy="100" r="2" fill="rgba(255,200,50,0.9)"/>
  <circle cx="270" cy="94" r="1.5" fill="rgba(255,200,50,0.7)"/>
  <circle cx="268" cy="106" r="1" fill="rgba(255,200,50,0.6)"/>
  <!-- label -->
  <text x="200" y="178" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11" font-family="Inter,Arial,sans-serif">Replace → images/p3-machining.jpg</text>
</svg>
