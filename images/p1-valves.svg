<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004D26"/>
      <stop offset="100%" style="stop-color:#006C35"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bg)"/>
  <!-- pipeline body -->
  <rect x="20" y="88" width="360" height="24" rx="4" fill="rgba(255,255,255,0.15)"/>
  <!-- gate valve body -->
  <rect x="160" y="60" width="80" height="80" rx="6" fill="rgba(200,151,58,0.8)" stroke="rgba(200,151,58,1)" stroke-width="2"/>
  <!-- valve stem -->
  <rect x="192" y="20" width="16" height="40" rx="3" fill="rgba(200,151,58,0.9)"/>
  <!-- handwheel -->
  <circle cx="200" cy="18" r="20" fill="none" stroke="rgba(200,151,58,0.9)" stroke-width="4"/>
  <line x1="200" y1="0" x2="200" y2="36" stroke="rgba(200,151,58,0.9)" stroke-width="3"/>
  <line x1="182" y1="18" x2="218" y2="18" stroke="rgba(200,151,58,0.9)" stroke-width="3"/>
  <!-- flanges -->
  <rect x="145" y="82" width="15" height="36" rx="2" fill="rgba(255,255,255,0.3)"/>
  <rect x="240" y="82" width="15" height="36" rx="2" fill="rgba(255,255,255,0.3)"/>
  <!-- bolt holes -->
  <circle cx="152" cy="90" r="2" fill="rgba(0,77,38,0.8)"/>
  <circle cx="152" cy="110" r="2" fill="rgba(0,77,38,0.8)"/>
  <circle cx="248" cy="90" r="2" fill="rgba(0,77,38,0.8)"/>
  <circle cx="248" cy="110" r="2" fill="rgba(0,77,38,0.8)"/>
  <!-- label -->
  <text x="200" y="178" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11" font-family="Inter,Arial,sans-serif">Replace → images/p1-valves.jpg</text>
</svg>
