<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5E1A"/>
      <stop offset="100%" style="stop-color:#C8973A"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bg)"/>
  <!-- seat ring -->
  <circle cx="120" cy="90" r="42" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="6"/>
  <circle cx="120" cy="90" r="24" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
  <!-- stem -->
  <rect x="186" y="50" width="28" height="80" rx="5" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <rect x="190" y="44" width="20" height="10" rx="3" fill="rgba(255,255,255,0.4)"/>
  <!-- seal/gasket -->
  <ellipse cx="290" cy="90" rx="48" ry="14" fill="rgba(255,255,255,0.0)" stroke="rgba(255,255,255,0.5)" stroke-width="5"/>
  <ellipse cx="290" cy="90" rx="32" ry="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- bolts -->
  <circle cx="56" cy="150" r="8" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <rect x="52" y="142" width="8" height="16" fill="rgba(255,255,255,0.2)"/>
  <circle cx="80" cy="150" r="8" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <circle cx="104" cy="150" r="8" fill="rgba(255,255,255,0.3)" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>
  <!-- label -->
  <text x="200" y="178" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="11" font-family="Inter,Arial,sans-serif">Replace → images/p2-parts.jpg</text>
</svg>
