<svg xmlns="http://www.w3.org/2000/svg" width="320" height="380" viewBox="0 0 320 380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004D26"/>
      <stop offset="100%" style="stop-color:#006C35"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C8973A"/>
      <stop offset="100%" style="stop-color:#A67820"/>
    </linearGradient>
  </defs>
  <rect width="320" height="380" fill="url(#bg)"/>
  <!-- subtle grid pattern -->
  <line x1="0" y1="60" x2="320" y2="60" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="0" y1="120" x2="320" y2="120" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="0" y1="180" x2="320" y2="180" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="0" y1="240" x2="320" y2="240" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="0" y1="300" x2="320" y2="300" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="60" y1="0" x2="60" y2="380" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="120" y1="0" x2="120" y2="380" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="180" y1="0" x2="180" y2="380" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="240" y1="0" x2="240" y2="380" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="380" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <!-- person silhouette -->
  <circle cx="160" cy="120" r="54" fill="url(#gold)" opacity="0.9"/>
  <ellipse cx="160" cy="310" rx="108" ry="90" fill="url(#gold)" opacity="0.7"/>
  <!-- initials -->
  <text x="160" y="132" text-anchor="middle" fill="white" font-size="36" font-weight="900" font-family="Inter,Arial,sans-serif">AA</text>
  <!-- label -->
  <rect x="20" y="345" width="280" height="24" rx="4" fill="rgba(0,0,0,0.3)"/>
  <text x="160" y="361" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="11" font-family="Inter,Arial,sans-serif">Replace → images/founder.jpg</text>
</svg>
