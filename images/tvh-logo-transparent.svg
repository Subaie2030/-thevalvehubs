<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 52" width="220" height="52">
  <!-- Transparent background — no rect fill -->

  <!-- ═══ VALVE ICON ═══ -->
  <!-- Left pipe -->
  <rect x="0" y="22" width="28" height="8" rx="2" fill="#2C6B3F"/>
  <!-- Left flange -->
  <rect x="26" y="17" width="5" height="18" rx="1.5" fill="#1E5C32"/>

  <!-- Valve body -->
  <rect x="31" y="13" width="28" height="26" rx="4" fill="#006C35"/>
  <!-- Valve body highlight -->
  <rect x="33" y="15" width="24" height="4" rx="2" fill="#00843F" opacity="0.6"/>
  <!-- Valve gate (inner detail) -->
  <rect x="38" y="19" width="14" height="14" rx="2" fill="#004D26"/>
  <!-- Handwheel spokes -->
  <line x1="45" y1="6" x2="45" y2="13" stroke="#C8973A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Handwheel ring -->
  <circle cx="45" cy="5" r="6" fill="none" stroke="#C8973A" stroke-width="2.5"/>
  <!-- Handwheel cross -->
  <line x1="39" y1="5" x2="51" y2="5" stroke="#C8973A" stroke-width="2" stroke-linecap="round"/>
  <line x1="45" y1="-1" x2="45" y2="11" stroke="#C8973A" stroke-width="2" stroke-linecap="round"/>

  <!-- Right flange -->
  <rect x="59" y="17" width="5" height="18" rx="1.5" fill="#1E5C32"/>
  <!-- Right pipe -->
  <rect x="64" y="22" width="28" height="8" rx="2" fill="#2C6B3F"/>

  <!-- ═══ TEXT ═══ -->
  <!-- "The" in gray-green -->
  <text x="100" y="30" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="600" fill="#5A7A62" letter-spacing="-0.3">The</text>
  <!-- "Valve" in dark green -->
  <text x="123" y="30" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="800" fill="#004D26" letter-spacing="-0.3">Valve</text>
  <!-- "Hubs" in gold -->
  <text x="164" y="30" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="800" fill="#C8973A" letter-spacing="-0.3">Hubs</text>

  <!-- Tagline -->
  <text x="100" y="42" font-family="'Segoe UI',Arial,sans-serif" font-size="7" font-weight="500" fill="#8A9E8F" letter-spacing="0.8">SAUDI ARABIA · VISION 2030</text>
</svg>
